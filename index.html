<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IkanKu - Toko Ikan Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0F2E33;
    --ink-light: #17454C;
    --paper: #F7F1E6;
    --paper-dark: #EDE4D3;
    --koi: #E76F3C;
    --koi-dark: #C25A2C;
    --text-dark: #1A1A18;
    --text-muted: #5C5C58;
    --line: rgba(15, 46, 51, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--paper);
    color: var(--text-dark);
    line-height: 1.5;
  }

  /* ---- Header ---- */
  header {
    background: var(--ink);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 22px;
    color: var(--paper);
    letter-spacing: 0.2px;
  }

  .brand span { color: var(--koi); }

  .tagline {
    color: rgba(247, 241, 230, 0.6);
    font-size: 13px;
    display: none;
  }

  @media (min-width: 640px) {
    .tagline { display: block; }
  }

  /* ---- Hero ---- */
  .hero {
    background: var(--ink);
    padding: 64px 32px 88px;
    position: relative;
    overflow: hidden;
  }

  .hero-inner {
    max-width: 720px;
    margin: 0 auto;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .hero-eyebrow {
    color: var(--koi);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .hero h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(32px, 5vw, 52px);
    color: var(--paper);
    line-height: 1.15;
    margin-bottom: 18px;
  }

  .hero p {
    color: rgba(247, 241, 230, 0.72);
    font-size: 16px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* wave divider */
  .wave {
    position: absolute;
    bottom: -1px;
    left: 0;
    width: 100%;
    height: 48px;
    display: block;
  }

  /* ---- Catalog ---- */
  .catalog {
    max-width: 1080px;
    margin: -48px auto 0;
    padding: 0 32px 80px;
    position: relative;
    z-index: 2;
  }

  .catalog-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .catalog-head h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 26px;
    color: var(--ink);
  }

  .catalog-head p {
    color: var(--text-muted);
    font-size: 14px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }

  .card {
    background: #FFFDF8;
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(15, 46, 51, 0.04);
    display: flex;
    flex-direction: column;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(15, 46, 51, 0.10);
  }

  .card-media {
    background: var(--paper-dark);
    height: 6px;
  }

  .card-body {
    padding: 20px 20px 18px;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    align-self: flex-start;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 12px;
  }

  .badge.hias {
    background: rgba(231, 111, 60, 0.12);
    color: var(--koi-dark);
  }

  .badge.konsumsi {
    background: rgba(15, 46, 51, 0.08);
    color: var(--ink);
  }

  .card h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 19px;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .card .stok {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .card .stok.habis { color: #A83232; font-weight: 500; }

  .price-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
    margin-bottom: 16px;
  }

  .price-row .rp {
    font-size: 13px;
    color: var(--text-muted);
  }

  .price-row .amount {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--ink);
  }

  .buy-row {
    display: flex;
    gap: 8px;
    margin-top: auto;
  }

  .qty {
    width: 56px;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    color: var(--text-dark);
    background: #fff;
  }

  .qty:focus {
    outline: none;
    border-color: var(--koi);
  }

  .btn-buy {
    flex: 1;
    background: var(--koi);
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 9px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.2px;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .btn-buy:hover { background: var(--koi-dark); }

  .btn-buy:disabled {
    background: #C9C4B5;
    cursor: not-allowed;
  }

  .empty, .error {
    grid-column: 1 / -1;
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }

  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--line);
  }

  /* toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--paper);
    padding: 12px 22px;
    border-radius: 4px;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 50;
    max-width: 90%;
    text-align: center;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #toast.err { background: #7A2A20; }
</style>
</head>
<body>

<header>
  <div class="brand">Ikan<span>Ku</span></div>
  <div class="tagline">Ikan hias & konsumsi, langsung dari peternak</div>
</header>

<section class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">Segar setiap hari</div>
    <h1>Kolam kami, meja Anda</h1>
    <p>Pilih ikan hias untuk akuarium atau ikan konsumsi untuk dapur, dikirim langsung dari kolam ke rumah Anda.</p>
  </div>
  <svg class="wave" viewBox="0 0 1440 48" preserveAspectRatio="none">
    <path d="M0,24 C240,48 480,0 720,24 C960,48 1200,0 1440,24 L1440,48 L0,48 Z" fill="#F7F1E6"></path>
  </svg>
</section>

<main class="catalog">
  <div class="catalog-head">
    <h2>Daftar ikan</h2>
    <p id="jumlah-produk"></p>
  </div>
  <div class="grid" id="daftar-ikan">
    <div class="empty">Memuat daftar ikan...</div>
  </div>
</main>

<footer>IkanKu &mdash; dibuat untuk tugas pengembangan web</footer>

<div id="toast"></div>

<script>
  const API_URL = 'https://ikanku-backend.valdinataalfauzan.workers.dev';
  const container = document.getElementById('daftar-ikan');
  const countLabel = document.getElementById('jumlah-produk');

  function formatRupiah(n) {
    return new Intl.NumberFormat('id-ID').format(n);
  }

  function showToast(message, isError) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = isError ? 'show err' : 'show';
    setTimeout(() => { toast.className = ''; }, 3000);
  }

  function renderIkan(data) {
    container.innerHTML = '';
    countLabel.textContent = data.length + ' jenis tersedia';

    if (data.length === 0) {
      container.innerHTML = '<div class="empty">Belum ada ikan yang tersedia.</div>';
      return;
    }

    data.forEach(ikan => {
      const habis = ikan.stok <= 0;
      const badgeClass = ikan.jenis === 'hias' ? 'hias' : 'konsumsi';

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-media"></div>
        <div class="card-body">
          <span class="badge ${badgeClass}">${ikan.jenis}</span>
          <h3>${ikan.nama_ikan}</h3>
          <p class="stok ${habis ? 'habis' : ''}">${habis ? 'Stok habis' : 'Stok: ' + ikan.stok + ' ekor'}</p>
          <div class="price-row">
            <span class="rp">Rp</span>
            <span class="amount">${formatRupiah(ikan.harga)}</span>
          </div>
          <div class="buy-row">
            <input type="number" class="qty" id="jumlah-${ikan.id}" min="1" max="${ikan.stok}" value="1" ${habis ? 'disabled' : ''}>
            <button class="btn-buy" onclick="beli(${ikan.id})" ${habis ? 'disabled' : ''}>${habis ? 'Habis' : 'Beli'}</button>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function muatIkan() {
    fetch(API_URL + '/api/ikan')
      .then(res => res.json())
      .then(renderIkan)
      .catch(() => {
        container.innerHTML = '<div class="error">Gagal memuat data. Coba muat ulang halaman.</div>';
      });
  }

  function beli(id) {
    const input = document.getElementById('jumlah-' + id);
    const jumlah = parseInt(input.value, 10);

    if (!jumlah || jumlah < 1) {
      showToast('Masukkan jumlah yang valid.', true);
      return;
    }

    const nama = prompt('Masukkan nama Anda untuk pesanan:');
    if (!nama || !nama.trim()) return;

    fetch(API_URL + '/api/pesanan', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nama_customer: nama.trim(), ikan_id: id, jumlah })
    })
      .then(res => res.json().then(data => ({ ok: res.ok, data })))
      .then(({ ok, data }) => {
        showToast(data.message, !ok);
        if (ok) muatIkan();
      })
      .catch(() => showToast('Gagal menghubungi server.', true));
  }

  muatIkan();
</script>

</body>
</html>
